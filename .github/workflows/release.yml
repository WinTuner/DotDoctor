name: Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Run Tests
        run: go test -v ./...

  build:
    name: Build Binary
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin]
        goarch: [amd64, arm64]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'

      - name: Compile and Package
        run: |
          VERSION="${{ github.ref_name }}"
          if [ -z "$VERSION" ] || [[ ! "$VERSION" =~ ^v ]]; then
            VERSION="v1.0.0-dev"
          fi
          
          mkdir -p dist
          cp LICENSE README.md dist/
          
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -trimpath -ldflags="-s -w" -o dist/dotdoctor ./cmd/dotdoctor
          tar -czf "dotdoctor-${VERSION}-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz" -C dist dotdoctor LICENSE README.md
          
          rm -rf dist

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dotdoctor-artifact-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dotdoctor-*.tar.gz
          retention-days: 1

  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: dotdoctor-artifact-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dotdoctor-*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
